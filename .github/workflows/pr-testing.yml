name: PR Testing

on:
  pull_request:
  workflow_dispatch:

jobs:
  testing:
    name: PR Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Branch
        uses: actions/checkout@v6.0.0
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
      - name: Install Dependencies
        run: npm ci --ignore-scripts
      - name: Build Action
        run: npm run ncc
